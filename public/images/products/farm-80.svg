  <rect x="130" y="130" width="140" height="24" rx="4" fill="#1A7FC4"/>
  <!-- Jerry can handle -->
  <path d="M200 130 L200 108 C200 100 220 100 220 108 L220 130" fill="none" stroke="#1A7FC4" stroke-width="5" stroke-linecap="round"/>
  <!-- Cap -->
  <rect x="185" y="118" width="30" height="14" rx="4" fill="#094C72"/>
  <rect x="190" y="114" width="20" height="6" rx="2" fill="#094C72"/>
  <!-- Ribs on jerry can -->
  <line x1="120" y1="170" x2="280" y2="170" stroke="#094C72" stroke-width="1.5" opacity="0.3"/>
  <line x1="118" y1="200" x2="282" y2="200" stroke="#094C72" stroke-width="1.5" opacity="0.3"/>
  <line x1="116" y1="230" x2="284" y2="230" stroke="#094C72" stroke-width="1.5" opacity="0.3"/>
  <line x1="114" y1="260" x2="286" y2="260" stroke="#094C72" stroke-width="1.5" opacity="0.3"/>
  <line x1="112" y1="290" x2="288" y2="290" stroke="#094C72" stroke-width="1.5" opacity="0.3"/>
  <!-- Label -->
  <rect x="140" y="155" width="120" height="130" rx="8" fill="white" opacity="0.95"/>
  <text x="200" y="182" text-anchor="middle" fill="#0B5E8A" font-family="Arial, sans-serif" font-weight="700" font-size="9">AMRICH</text>
  <text x="200" y="200" text-anchor="middle" fill="#0B5E8A" font-family="Arial, sans-serif" font-weight="900" font-size="14">FARM 80%</text>
  <text x="200" y="220" text-anchor="middle" fill="#1A7FC4" font-family="Arial, sans-serif" font-weight="600" font-size="8">Pond Disinfectant</text>
  <line x1="150" y1="232" x2="250" y2="232" stroke="#1A7FC4" stroke-width="0.5"/>
  <text x="200" y="250" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-weight="500" font-size="8">5 LITRE CAN</text>
  <rect x="168" y="258" width="64" height="14" rx="7" fill="#1A7FC4"/>
  <text x="200" y="269" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="700" font-size="7">LIQUID</text>
