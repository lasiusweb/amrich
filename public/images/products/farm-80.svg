<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="24" fill="#E8F4FD"/>
  <rect x="60" y="60" width="280" height="280" rx="20" fill="white" stroke="#1A7FC4" stroke-width="2"/>
  <!-- Jerry can body -->
  <path d="M120 150 L110 320 L290 320 L280 150Z" fill="#0B5E8A"/>
  <path d="M110 320 L290 320 L295 338 L105 338Z" fill="#094C72"/>
