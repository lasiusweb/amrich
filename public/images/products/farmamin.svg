<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="24" fill="#E8F4FD"/>
  <rect x="60" y="60" width="280" height="280" rx="20" fill="white" stroke="#1A7FC4" stroke-width="2"/>
  <!-- Pouch body -->
  <rect x="135" y="115" width="130" height="192" rx="10" fill="#0B5E8A"/>
