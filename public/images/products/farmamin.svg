  <text x="200" y="184" text-anchor="middle" fill="#0B5E8A" font-family="Arial, sans-serif" font-weight="900" font-size="13">FARMAMIN</text>
  <text x="200" y="202" text-anchor="middle" fill="#1A7FC4" font-family="Arial, sans-serif" font-weight="600" font-size="8">Mineral Balancer</text>
  <line x1="160" y1="213" x2="240" y2="213" stroke="#1A7FC4" stroke-width="0.5"/>
  <text x="200" y="230" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-weight="500" font-size="8">1 kg POUCH</text>
  <rect x="178" y="242" width="44" height="14" rx="7" fill="#1A7FC4"/>
  <text x="200" y="253" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="700" font-size="7">POWDER</text>
