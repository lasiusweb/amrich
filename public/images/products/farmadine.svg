  <line x1="158" y1="100" x2="158" y2="112" stroke="#0B5E8A" stroke-width="1.5"/>
  <line x1="168" y1="100" x2="168" y2="112" stroke="#0B5E8A" stroke-width="1.5"/>
  <line x1="178" y1="100" x2="178" y2="112" stroke="#0B5E8A" stroke-width="1.5"/>
  <line x1="188" y1="100" x2="188" y2="112" stroke="#0B5E8A" stroke-width="1.5"/>
  <line x1="198" y1="100" x2="198" y2="112" stroke="#0B5E8A" stroke-width="1.5"/>
  <line x1="208" y1="100" x2="208" y2="112" stroke="#0B5E8A" stroke-width="1.5"/>
  <line x1="218" y1="100" x2="218" y2="112" stroke="#0B5E8A" stroke-width="1.5"/>
  <line x1="228" y1="100" x2="228" y2="112" stroke="#0B5E8A" stroke-width="1.5"/>
  <line x1="238" y1="100" x2="238" y2="112" stroke="#0B5E8A" stroke-width="1.5"/>
  <!-- Label -->
  <rect x="152" y="170" width="96" height="110" rx="6" fill="white" opacity="0.95"/>
