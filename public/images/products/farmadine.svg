  <text x="200" y="254" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-weight="500" font-size="8">1 LITRE</text>
  <rect x="172" y="262" width="56" height="14" rx="7" fill="#1A7FC4"/>
  <text x="200" y="273" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-weight="700" font-size="7">LIQUID</text>
