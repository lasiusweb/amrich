  <text x="200" y="212" text-anchor="middle" fill="#0B5E8A" font-family="Arial, sans-serif" font-weight="900" font-size="13">FARMADINE</text>
  <text x="200" y="230" text-anchor="middle" fill="#1A7FC4" font-family="Arial, sans-serif" font-weight="600" font-size="8">Iodine Treatment</text>
