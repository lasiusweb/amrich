  <rect x="115" y="155" width="170" height="135" rx="8" fill="white" opacity="0.95"/>
  <text x="200" y="182" text-anchor="middle" fill="#0B5E8A" font-family="Arial, sans-serif" font-weight="700" font-size="10">AMRICH</text>
  <text x="200" y="202" text-anchor="middle" fill="#0B5E8A" font-family="Arial, sans-serif" font-weight="900" font-size="14">SHRIMP CARE</text>
