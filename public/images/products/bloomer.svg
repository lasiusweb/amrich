<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" rx="24" fill="#E8F4FD"/>
  <rect x="60" y="60" width="280" height="280" rx="20" fill="white" stroke="#1A7FC4" stroke-width="2"/>
  <!-- Large pouch body (5 kg) -->
  <rect x="115" y="110" width="170" height="200" rx="12" fill="#0B5E8A"/>
