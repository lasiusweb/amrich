[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[redirects]]
  from = "/products/disease-stress-management"
  to = "/products/disease-stress-management/"
  status = 301

[[redirects]]
  from = "/products/feed-pond-preparers"
  to = "/products/feed-pond-preparers/"
  status = 301

[[redirects]]
  from = "/products/probiotics-soil-care"
  to = "/products/probiotics-soil-care/"
  status = 301

[[redirects]]
  from = "/products/water-quality-ammonia-control"
  to = "/products/water-quality-ammonia-control/"
  status = 301
